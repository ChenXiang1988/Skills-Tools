<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{PROJECT_NAME}} Mobile / PDA Prototype</title>
  <link rel="stylesheet" href="assets/design-system/tokens.css">
  <link rel="stylesheet" href="assets/prototype.css">
  <link rel="stylesheet" href="assets/device-frame.css">
  <link rel="stylesheet" href="assets/prototype-mobile.css">
</head>
<body>
  <main class="mobile-demo">
    <h2>{{PROJECT_NAME}} Mobile / PDA Prototype</h2>
    <p>Single-device-frame prototype. Use tabs inside the same frame for multiple pages.</p>
    <section class="device-pda">
      <div class="device-label">PDA / Android</div>
      <div class="device-screen">
        <div class="device-content">
          <div class="app">
            <div class="app-topbar"><div class="ab-title">Collection Workflow</div></div>
            <div class="app-body">
              <div class="app-card">
                <div class="card-title">Current Document <span class="tag tag-blue">Sample</span></div>
                <div class="app-field"><label>SKU</label><div class="app-input">Pending</div></div>
                <div class="app-field"><label>Received quantity</label><div class="app-input">-- / --</div></div>
                <span class="app-btn primary block">Submit Capture</span>
              </div>
            </div>
            <div class="app-tabbar"><div class="app-tab active">Tasks</div><div class="app-tab">Capture</div><div class="app-tab">Me</div></div>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
