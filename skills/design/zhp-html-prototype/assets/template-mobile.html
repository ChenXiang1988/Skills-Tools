<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1.0">
<title>移动端原型 · 模板</title>
<link rel="stylesheet" href="assets/prototype.css">
<link rel="stylesheet" href="assets/device-frame.css">
<link rel="stylesheet" href="assets/prototype-mobile.css">
</head>
<body>
<!-- 单台 iPhone 骨架：把 .device-content 内的 .app 换成你的页面 -->
<div class="device-iphone">
  <div class="device-screen">
    <div class="device-statusbar">
      <span class="device-time">9:41</span>
      <div class="device-statusicons">
        <div class="device-signal"><i></i><i></i><i></i><i></i></div>
        <svg class="device-wifi" viewBox="0 0 16 12" fill="none">
          <path d="M8 11.5a1 1 0 100-2 1 1 0 000 2z" fill="currentColor"/>
          <path d="M3 7.5a7 7 0 0110 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
          <path d="M1 4.5a11 11 0 0114 0" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>
        </svg>
        <div class="device-battery"><span></span></div>
      </div>
    </div>
    <div class="device-island"></div>

    <div class="device-content">
      <!-- ===== 你的 app 从这里开始 ===== -->
      <div class="app" id="app">
        <div class="app-topbar">
          <div class="ab-back" onclick="history.back()">‹</div>
          <div class="ab-title">页面标题</div>
          <div class="ab-action">操作</div>
        </div>

        <div class="app-body">
          <div class="app-search">
            <span>🔍</span><span>搜索 / 输入单号</span>
          </div>

          <div class="app-stat-grid">
            <div class="app-stat"><div class="v">128</div><div class="k">待处理</div></div>
            <div class="app-stat"><div class="v success">96%</div><div class="k">完成率</div></div>
          </div>

          <div class="app-list">
            <div class="app-list-item" onclick="App.openSheet()">
              <span class="li-badge dot dot-blue"></span>
              <div class="li-main">
                <div class="li-title">任务行示例</div>
                <div class="li-sub">副信息 · 09:30</div>
              </div>
              <span class="li-arrow">›</span>
            </div>
          </div>
        </div>

        <div class="app-tabbar">
          <div class="app-tab active" data-tab="home"><span class="ic">🏠</span>首页</div>
          <div class="app-tab" data-tab="task"><span class="ic">📋</span>任务</div>
          <div class="app-tab" data-tab="scan"><span class="ic">📷</span>采集</div>
          <div class="app-tab" data-tab="me"><span class="ic">👤</span>我的</div>
        </div>
      </div>
      <!-- ===== app 结束 ===== -->
    </div>

    <div class="device-home"></div>

    <!-- 底部弹层 -->
    <div class="app-sheet-mask" id="sheet" onclick="App.closeSheet()">
      <div class="app-sheet" onclick="event.stopPropagation()">
        <div class="sheet-title">操作</div>
        <div class="sheet-item" onclick="App.closeSheet()">查看详情</div>
        <div class="sheet-item" onclick="App.closeSheet()">编辑</div>
        <div class="sheet-item danger" onclick="App.closeSheet()">删除</div>
      </div>
    </div>
  </div>
</div>

<script>
/* 极简交互：TabBar 切换激活态 + 弹层开关。
   真实项目里每个 Tab 对应一块界面（用 data-screen 切换显示）。 */
const App = {
  openSheet() { document.getElementById('sheet').classList.add('open'); },
  closeSheet() { document.getElementById('sheet').classList.remove('open'); },
};
document.querySelectorAll('.app-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.app-tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});
</script>
</body>
</html>
