<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>pakco.html</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="../assets/fonts.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:#0b0c10;color:#e8ebf4;font-family:'Inter','PingFang SC',system-ui,sans-serif}

  /* ───── Header ───── */
  header{position:sticky;top:0;z-index:50;background:rgba(11,12,16,.92);backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.08);padding:16px 32px 12px;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:24px;row-gap:14px}
  header .brand h1{margin:0;font-size:20px;letter-spacing:-.01em;font-weight:800}
  header .brand h1 .accent{background:linear-gradient(135deg,#a78bfa 0%,#f472b6 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
  header .brand .sub{color:#8a90a4;font-size:12px;margin-top:2px}

  /* Middle install command */
  .install{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:6px 6px 6px 14px;
    font-family:'JetBrains Mono','SFMono-Regular',monospace;font-size:13px;color:#cfd4e2;
    max-width:520px}
  .install .prompt{color:#6a7086;user-select:none}
  .install code{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e8ebf4}
  .install button{background:linear-gradient(135deg,#a78bfa 0%,#f472b6 100%);color:#fff;border:0;
    padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;
    font-family:'Inter',sans-serif;transition:.15s;white-space:nowrap}
  .install button:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(167,139,250,.4)}
  .install button.ok{background:#1aaf6c}

  /* Top-right controls */
  .controls{display:flex;gap:10px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
  .controls input[type=search]{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    color:#e8ebf4;padding:8px 14px;border-radius:8px;font-size:13px;width:200px;outline:none}
  .controls input[type=search]:focus{border-color:#a78bfa}
  .controls .size-toggle,.controls .lang-toggle{display:flex;background:rgba(255,255,255,.05);border-radius:8px;padding:3px}
  .controls .size-toggle button,.controls .lang-toggle button{padding:6px 12px;font-size:12px;color:#aab0c0;background:transparent;
    border:0;border-radius:6px;cursor:pointer;font-family:'Inter','PingFang SC',sans-serif;font-weight:600}
  .controls .size-toggle button.active,.controls .lang-toggle button.active{background:rgba(255,255,255,.12);color:#fff}
  .controls .lang-toggle button.active{background:linear-gradient(135deg,#a78bfa 0%,#f472b6 100%);color:#fff}

  /* Tabs */
  .tabs{grid-column:1/-1;display:flex;gap:4px;background:rgba(255,255,255,.05);padding:4px;
    border-radius:10px;width:fit-content;margin:0 auto;margin-top:4px}
  .tab{padding:9px 22px;font-size:13px;font-weight:600;color:#aab0c0;border:0;background:transparent;
    border-radius:7px;cursor:pointer;transition:.15s;font-family:'Inter','PingFang SC',sans-serif}
  .tab.active{background:#fff;color:#0b0c10}
  .tab:not(.active):hover{color:#fff;background:rgba(255,255,255,.08)}

  /* Grid + Card */
  main{padding:24px 32px 64px}
  .grid{display:grid;gap:16px}
  .grid.size-s{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .grid.size-m{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  .grid.size-l{grid-template-columns:repeat(auto-fill,minmax(440px,1fr))}
  .card{background:#13141a;border:1px solid rgba(255,255,255,.08);border-radius:12px;
    overflow:hidden;transition:.2s;cursor:pointer;position:relative}
  .card:hover{transform:translateY(-2px);border-color:rgba(167,139,250,.4);
    box-shadow:0 12px 30px rgba(0,0,0,.4)}
  .card.copied{border-color:#1aaf6c;box-shadow:0 0 0 2px rgba(26,175,108,.3)}
  .card.custom-card{min-height:280px;border-style:dashed;border-color:rgba(167,139,250,.45);
    background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(244,114,182,.08) 52%,rgba(103,232,249,.08))}
  .card.custom-card:hover{border-color:rgba(244,114,182,.72);box-shadow:0 18px 46px rgba(167,139,250,.22)}
  .custom-preview{aspect-ratio:16/10;display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(circle at 28% 24%,rgba(167,139,250,.28),transparent 34%),
      radial-gradient(circle at 72% 68%,rgba(103,232,249,.18),transparent 38%),
      rgba(255,255,255,.03)}
  .custom-plus{width:76px;height:76px;border-radius:24px;display:grid;place-items:center;
    background:linear-gradient(135deg,#a78bfa,#f472b6);color:#fff;font-size:52px;line-height:1;font-weight:300;
    box-shadow:0 18px 44px rgba(167,139,250,.35)}
  .custom-card .meta{padding:16px 18px}
  .custom-card .name{font-size:16px}
  .custom-card .desc{font-size:12px;color:#b8c0d4}
  .ui-demo{aspect-ratio:16/10;padding:18px;background:#10131c;position:relative;overflow:hidden;color:#f7f8fb;
    --ui-panel:rgba(255,255,255,.08);--ui-border:rgba(255,255,255,.14);--ui-muted:rgba(255,255,255,.58);--ui-accent:#67e8f9}
  .ui-demo:before{content:"";position:absolute;inset:-35%;background:radial-gradient(circle at 20% 12%,var(--ui-glow-a,rgba(103,232,249,.24)),transparent 28%),radial-gradient(circle at 84% 72%,var(--ui-glow-b,rgba(167,139,250,.24)),transparent 34%);opacity:.9}
  .ui-stage{position:relative;height:100%;display:flex;flex-direction:column;gap:10px}
  .ui-topbar{height:26px;border:1px solid var(--ui-border);background:var(--ui-panel);border-radius:9px;
    display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:8px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
  .ui-nav{display:flex;gap:5px}.ui-nav span{width:26px;height:6px;border-radius:99px;background:rgba(255,255,255,.24);display:block}
  .ui-pill{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--ui-border);border-radius:99px;
    padding:4px 8px;font-size:8px;font-weight:800;letter-spacing:.04em;color:var(--ui-accent);background:rgba(255,255,255,.06)}
  .ui-body{min-height:0;flex:1;display:grid;gap:10px}
  .ui-body.two{grid-template-columns:.8fr 1.2fr}.ui-body.three{grid-template-columns:.72fr 1fr .78fr}
  .ui-pane,.ui-widget,.ui-phone,.ui-shot{border:1px solid var(--ui-border);background:var(--ui-panel);border-radius:14px;min-width:0;overflow:hidden}
  .ui-pane{padding:12px;display:flex;flex-direction:column;gap:9px}.ui-pane.tight{padding:9px;gap:7px}
  .ui-title{font-size:22px;line-height:.92;font-weight:900;letter-spacing:-.04em}.ui-title.small{font-size:16px;line-height:1}
  .ui-sub{font-size:8px;line-height:1.35;color:var(--ui-muted);font-weight:600}
  .ui-btnrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}.ui-btn{height:20px;border-radius:7px;background:var(--ui-accent);color:#071018;padding:0 9px;display:flex;align-items:center;font-size:8px;font-weight:900}.ui-btn.ghost{background:rgba(255,255,255,.08);color:inherit;border:1px solid var(--ui-border)}
  .ui-metric{font-size:26px;font-weight:950;letter-spacing:-.05em;line-height:1}.ui-caption{font-size:7px;color:var(--ui-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:800}
  .ui-bars{display:flex;align-items:end;gap:5px;height:44px;margin-top:auto}.ui-bars span{flex:1;border-radius:5px 5px 2px 2px;background:linear-gradient(180deg,var(--ui-accent),rgba(255,255,255,.16))}
  .ui-list{display:flex;flex-direction:column;gap:6px}.ui-row{display:flex;align-items:center;gap:7px;border:1px solid var(--ui-border);background:rgba(255,255,255,.05);border-radius:9px;padding:6px}.ui-dot{width:9px;height:9px;border-radius:50%;background:var(--ui-accent);flex:0 0 auto}.ui-copyline{height:6px;border-radius:99px;background:rgba(255,255,255,.22);flex:1}.ui-copyline.short{max-width:54%}
  .ui-phone{width:82px;margin:auto;padding:8px;border-radius:22px;background:#0b0f19}.ui-screen{height:132px;border-radius:16px;background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.04));padding:9px;display:flex;flex-direction:column;gap:7px}.ui-card-mini{border-radius:10px;background:rgba(255,255,255,.12);border:1px solid var(--ui-border);padding:7px}
  .ui-shot{display:grid;grid-template-rows:28px 1fr;background:#fff;color:#10131c}.ui-shot-head{background:#edf0f7;display:flex;align-items:center;gap:5px;padding:0 8px}.ui-shot-head span{width:6px;height:6px;border-radius:50%;background:#aab0c0}.ui-shot-main{padding:12px;display:grid;grid-template-columns:1fr .8fr;gap:10px}.ui-image{border-radius:12px;background:linear-gradient(135deg,#111827,#5eead4 54%,#f472b6);min-height:72px}.ui-code{border-radius:10px;background:#111827;padding:8px;display:flex;flex-direction:column;gap:5px}.ui-code span{height:5px;border-radius:99px;background:#67e8f9}.ui-code span:nth-child(2n){background:#a78bfa;width:76%}
  .ui-demo.minimal{background:#f7f8fb;color:#10131c;--ui-panel:#fff;--ui-border:rgba(15,23,42,.12);--ui-muted:#64748b;--ui-accent:#111827;--ui-glow-a:rgba(15,23,42,.08);--ui-glow-b:rgba(148,163,184,.16)}
  .ui-demo.brutalist{background:#e8e000;color:#050505;--ui-panel:#050505;--ui-border:#050505;--ui-muted:#d8d8d8;--ui-accent:#e8e000;--ui-glow-a:transparent;--ui-glow-b:transparent}
  .ui-demo.brutalist .ui-pane,.ui-demo.brutalist .ui-widget,.ui-demo.brutalist .ui-topbar{border:2px solid #050505;border-radius:2px;box-shadow:7px 7px 0 #fff;color:#fff}
  .ui-demo.soft{background:#f6efe8;color:#5a3e36;--ui-panel:rgba(255,255,255,.72);--ui-border:rgba(155,112,84,.18);--ui-muted:#967568;--ui-accent:#9b7054;--ui-glow-a:rgba(155,112,84,.18);--ui-glow-b:rgba(244,205,178,.34)}
  .ui-demo.gpt{background:#090b12;--ui-panel:rgba(13,18,31,.86);--ui-border:rgba(103,232,249,.2);--ui-accent:#67e8f9;--ui-glow-a:rgba(103,232,249,.26);--ui-glow-b:rgba(167,139,250,.2)}
  .ui-demo.legacy{background:#fdfdfb;color:#171717;--ui-panel:#fff;--ui-border:#d7d7d2;--ui-muted:#757575;--ui-accent:#2563eb;--ui-glow-a:rgba(37,99,235,.12);--ui-glow-b:rgba(0,0,0,.04)}
  .ui-demo.redesign{background:#111827;--ui-panel:rgba(255,255,255,.08);--ui-border:rgba(248,113,113,.32);--ui-accent:#f87171;--ui-glow-a:rgba(248,113,113,.26);--ui-glow-b:rgba(251,191,36,.14)}
  .ui-demo.imagecode{background:#0c1020;--ui-panel:rgba(255,255,255,.08);--ui-border:rgba(94,234,212,.24);--ui-accent:#5eead4;--ui-glow-a:rgba(94,234,212,.24);--ui-glow-b:rgba(244,114,182,.2)}
  .ui-demo.stitch{background:#f8fafc;color:#0f172a;--ui-panel:#fff;--ui-border:rgba(37,99,235,.16);--ui-muted:#64748b;--ui-accent:#2563eb;--ui-glow-a:rgba(37,99,235,.12);--ui-glow-b:rgba(20,184,166,.14)}
  .ui-demo .badge{position:absolute;top:10px;left:10px;background:rgba(103,232,249,.88);color:#071018;
    font-size:10px;padding:2px 8px;border-radius:4px;font-weight:700;z-index:2;font-family:'JetBrains Mono',monospace}
  /* 配图卡片预览舞台(社交卡海报按选中比例居中展示) */
  .card-demo{aspect-ratio:4/3;display:grid;place-items:center;padding:18px;position:relative;overflow:hidden;
    background:radial-gradient(circle at 28% 18%,rgba(167,139,250,.12),transparent 42%),radial-gradient(circle at 78% 82%,rgba(103,232,249,.1),transparent 44%),#0c0d12}
  .card-demo .badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.72);color:#fff;
    font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;z-index:2;font-family:'JetBrains Mono',monospace}
  .card-demo .badge.count{left:auto;right:10px;background:rgba(167,139,250,.85);color:#fff;font-weight:700}
  .meta .enter{margin:8px 0 0;font-size:11px;color:#67e8f9;font-weight:600;display:flex;align-items:center;gap:5px}
  .preview{aspect-ratio:16/10;background:#fff;position:relative;overflow:hidden}
  .preview.portrait{aspect-ratio:3/4}
  .preview iframe{position:absolute;inset:0;width:166.67%;height:166.67%;border:0;
    transform:scale(.6);transform-origin:0 0;pointer-events:none}
  /* 模板(外部 URL): 再缩一倍, 让 deck 按更接近设计宽度渲染 */
  .preview iframe[src]{width:333.33%;height:333.33%;transform:scale(.3)}
  .preview.portrait iframe[src]{width:250%;height:250%;transform:scale(.4)}
  .preview .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);color:#fff;
    font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;z-index:2}
  .preview .badge.scenario{background:rgba(167,139,250,.85)}
  .preview .badge.extracted{background:rgba(244,114,182,.85)}
  .preview .badge.local{background:rgba(26,175,108,.88)}
  .preview .badge.ui{background:rgba(103,232,249,.85);color:#071018}

  /* Copy button on each card (no propagation) */
  .copy-btn{position:absolute;top:8px;right:8px;z-index:3;background:rgba(167,139,250,.85);
    color:#fff;border:0;padding:5px 11px;border-radius:6px;font-size:11px;font-weight:600;
    cursor:pointer;font-family:'Inter','PingFang SC',sans-serif;opacity:0;transition:.15s}
  .card:hover .copy-btn{opacity:1}
  .copy-btn:hover{background:#a78bfa;transform:scale(1.05)}
  .copy-btn.ok{background:#1aaf6c;opacity:1}
  /* 删除按钮(仅 local 自建卡) */
  .del-btn{position:absolute;top:8px;left:8px;z-index:4;background:rgba(224,99,90,.92);color:#fff;border:0;
    width:26px;height:26px;border-radius:6px;font-size:13px;line-height:1;cursor:pointer;opacity:0;transition:.15s;
    display:flex;align-items:center;justify-content:center;padding:0}
  .card:hover .del-btn{opacity:1}
  .del-btn:hover{background:#e0635a;transform:scale(1.1)}
  .del-btn.ok{background:#1aaf6c;opacity:1}

  /* Zoom hint bottom-right */
  .zoom-hint{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;
    font-size:10px;padding:3px 8px;border-radius:4px;opacity:0;transition:.15s;pointer-events:none;
    font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
  .card:hover .zoom-hint{opacity:1}

  .meta{padding:12px 14px}
  .meta .name{margin:0;font-size:13px;font-weight:700;letter-spacing:-.01em}
  .meta .desc{margin:4px 0 0;font-size:11px;color:#8a90a4;line-height:1.5}
  .meta .id{margin:6px 0 0;font-size:10px;color:#5a6076;font-family:'JetBrains Mono',monospace}
  .meta .author{margin:4px 0 0;font-size:10px;color:#6a7086;font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
  .meta .feat{margin:4px 0 0;font-size:10px;display:flex;gap:6px;flex-wrap:wrap}
  .meta .feat span{padding:1px 6px;border-radius:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.03em}
  .meta .feat .yes{background:rgba(26,175,108,.15);color:#1aaf6c}
  .meta .feat .no{background:rgba(255,255,255,.05);color:#5a6076}
  .meta .feat .kind{background:rgba(103,232,249,.12);color:#67e8f9}
  .empty{padding:80px 20px;text-align:center;color:#5a6076}

  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);
    z-index:100;display:none;align-items:center;justify-content:center;padding:32px}
  .modal.open{display:flex}
  .modal-wrap{position:relative;width:min(1280px,95vw);aspect-ratio:16/10;max-height:90vh;
    background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 30px 100px rgba(0,0,0,.6)}
  .modal-inner{position:absolute;inset:0}
  .modal-inner iframe{width:100%;height:100%;border:0;display:block}
  .modal-close{position:absolute;top:14px;right:14px;z-index:5;background:rgba(0,0,0,.7);color:#fff;
    border:0;width:36px;height:36px;border-radius:18px;cursor:pointer;font-size:18px;line-height:1}
  .modal-close:hover{background:rgba(0,0,0,.95)}
  .modal-copy{position:absolute;top:14px;right:60px;z-index:5;background:rgba(167,139,250,.95);color:#fff;
    border:0;height:36px;padding:0 14px;border-radius:18px;cursor:pointer;font-size:13px;font-weight:600;
    font-family:'Inter','PingFang SC',sans-serif;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .modal-copy:hover{background:#a78bfa;transform:translateY(-1px)}
  .modal-copy.ok{background:#1aaf6c}
  /* 皮肤/模板放大工作台的预览舞台(整块 iframe, 横/纵都用) */
  .ds-stage{padding:0!important;display:block!important;background:#fff;position:relative}
  .ds-stage iframe{position:absolute;top:0;left:0;width:1280px;height:800px;border:0;display:block;
    transform-origin:0 0}
  .modal-name{position:absolute;top:14px;left:14px;z-index:5;background:rgba(0,0,0,.7);color:#fff;
    padding:8px 16px;border-radius:18px;font-size:13px;font-weight:600;
    font-family:'Inter','PingFang SC',sans-serif}

  /* 配图预览工作台(切配色 + 选比例 + 复制) */
  .card-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);
    z-index:110;display:none;align-items:center;justify-content:center;padding:32px}
  .card-modal.open{display:flex}
  .card-studio{position:relative;width:min(1180px,95vw);max-height:90vh;background:#13141a;
    border:1px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;
    display:grid;grid-template-columns:2fr 280px;box-shadow:0 30px 100px rgba(0,0,0,.6)}
  .cs-stage{display:grid;place-items:center;padding:36px;min-height:520px;overflow:hidden;
    background:radial-gradient(circle at 28% 18%,rgba(167,139,250,.14),transparent 44%),radial-gradient(circle at 78% 84%,rgba(103,232,249,.1),transparent 46%),#0c0d12}
  .cs-stage .sc-poster{max-height:100%}
  .cs-panel{padding:30px 30px 26px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}
  .cs-tone{margin:0;font-size:20px;font-weight:800;letter-spacing:-.01em;padding-right:34px}
  .cs-tone-desc{margin:0;font-size:13px;line-height:1.6;color:#aab0c0}
  .cs-group{display:flex;flex-direction:column;gap:9px}
  .cs-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6a7086;
    font-family:'JetBrains Mono',monospace}
  .cs-chips{display:flex;flex-wrap:wrap;gap:8px}
  .cs-chip{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:9px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#cfd4e2;font-size:12px;
    font-weight:600;font-family:'Inter','PingFang SC',sans-serif;transition:.15s}
  .cs-chip:hover{border-color:rgba(255,255,255,.28)}
  .cs-chip.active{border-color:#67e8f9;background:rgba(103,232,249,.12);color:#fff}
  .cs-chip .sw{width:14px;height:14px;border-radius:4px;border:1px solid rgba(255,255,255,.25);flex:0 0 auto}
  .cs-chip.ratio{font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
  .cs-spec{margin:0;font-size:12px;color:#8a90a4;font-family:'JetBrains Mono',monospace}
  .cs-copy{margin-top:auto;background:linear-gradient(135deg,#a78bfa 0%,#f472b6 100%);color:#fff;border:0;
    padding:13px 18px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;
    font-family:'Inter','PingFang SC',sans-serif;transition:.15s}
  .cs-copy:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(167,139,250,.4)}
  .cs-copy.ok{background:#1aaf6c}
  .cs-note{margin:0;font-size:11px;color:#5a6076;text-align:center}
  @media (max-width:760px){.card-studio{grid-template-columns:1fr;max-height:94vh}.cs-stage{min-height:300px;padding:24px}}

  /* Toast */
  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(26,175,108,.95);color:#fff;padding:12px 24px;border-radius:24px;
    font-size:13px;font-weight:600;font-family:'Inter','PingFang SC',sans-serif;
    box-shadow:0 12px 30px rgba(26,175,108,.4);opacity:0;pointer-events:none;transition:.3s;z-index:200;
    display:flex;align-items:center;gap:8px;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

let view = 'themes';

function T(){ return I18N[lang]; }
function themeLabel(item){ const [id, zh, en] = item; return lang==='zh' ? zh : (en || zh || id); }
function themeDesc(item){ const [,,,dz,de] = item; return lang==='zh' ? dz : (de || dz); }
function deckLabel(item){ const [id, zh, en] = item; return lang==='zh' ? zh : (en || zh || id); }
function deckDesc(item){ const [,,,,dz,de] = item; return lang==='zh' ? dz : (de || dz); }
function safeText(v, fallback=''){ return typeof v === 'string' && v.trim() ? v.trim() : fallback; }
function localLabel(item){ return lang==='zh' ? safeText(item.labelZh, item.labelEn || item.id) : safeText(item.labelEn, item.labelZh || item.id); }
function localDesc(item){ return lang==='zh' ? safeText(item.descZh, item.descEn || '') : safeText(item.descEn, item.descZh || ''); }
function localPrompt(item){
  if(item && typeof item.prompt === 'string' && item.prompt.trim()) return item.prompt;
  if(item && item.type === 'theme'){
    return lang === 'zh'
      ? `请使用 pakco.html 本地主题 ${item.id} 生成一份 HTML deck。\n- 本地主题 CSS：${item.css}\n- 内容：[在此粘贴你的内容大纲]\n请输出完整可直接浏览器打开的 HTML。`
      : `Please use the local pakco.html theme ${item.id} to build an HTML deck.\n- local theme CSS: ${item.css}\n- content: [paste your outline here]\nPlease return a complete browser-openable HTML deck.`;
  }
  return lang === 'zh'
    ? `请基于 pakco.html 本地 deck ${item.id} 的视觉风格继续生成。\n- 本地入口：${item.path}\n- 内容：[在此粘贴你的内容大纲]\n请输出完整可直接浏览器打开的 HTML。`
    : `Please continue using the visual taste from local pakco.html deck ${item.id}.\n- local entry: ${item.path}\n- content: [paste your outline here]\nPlease return a complete browser-openable HTML deck.`;
}

async function loadLocalTaste(){
  try{
    const res = await fetch('../examples/pakco-html.local.json', {cache: 'no-store'});
    if(!res.ok) return;
    const data = await res.json();
    localTaste = {
      themes: Array.isArray(data.themes) ? data.themes : [],
      decks: Array.isArray(data.decks) ? data.decks : []
    };
  }catch(_){
    localTaste = {themes: [], decks: []};
  }
}

/* ───── Copy + toast ───── */
async function copyToClipboard(text){
  try{ await navigator.clipboard.writeText(text); return true; }
  catch(e){
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); document.body.removeChild(ta); return true; }
    catch(_){ document.body.removeChild(ta); return false; }
  }
}

const toast = document.getElementById('toast');
const toastText = document.getElementById('toast-text');
let toastTimer = null;
function showToast(msg){
  toastText.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 2400);
}

      <p class="id">--skill "${item.installName}"</p>
    </div>`;
  const modalSrc = {srcdoc: uiTastePreview(item)};
  const modalLabel = `${label} · ${item.installName}`;
  async function copyUI(e){
    if(e) e.stopPropagation();
    const ok = await copyToClipboard(promptText);
    if(ok){
      card.classList.add('copied');
      const btn = card.querySelector('.copy-btn');
      btn.textContent = T().copied;
      showToast(T().toastCardCopied(label));
      setTimeout(()=>{
        card.classList.remove('copied');

    }
  }
  card.addEventListener('click',()=>openModal(modalSrc, modalLabel, promptText));
  card.querySelector('.copy-btn').addEventListener('click', copyUI);
  return card;
}

function toneMatches(tone){

function createToneCard(tone){
  const card = document.createElement('div');
  card.className = 'card tone-card';

  if(tone.deckTemplate){
    const t = T();
    const cn = lang==='zh';
    const deckDir = tone.id;
    const label = toneLabel(tone);
    const desc = toneDesc(tone);
    const iframeSrc = `full-decks/${deckDir}/index.html?lang=${lang}`;
    const fmtCtx = { render:(f)=>{
      const params = new URLSearchParams();
      params.set('lang', lang);
      if(f==='scroll') params.set('scroll', '1');
      const url = `full-decks/${deckDir}/index.html?${params}`;
      const prompt = t.promptDeck(deckDir, label, f);
      return { src:{src:url}, prompt };
    } };
    const studioCtx = { name: label, desc, spec: `模板 · templates/full-decks/${deckDir}/`, render: fmtCtx.render };
    card.innerHTML = `
      <button class="copy-btn" type="button">${t.copyPrompt}</button>
      <span class="zoom-hint">${t.zoomHint}</span>
      <div class="preview portrait">
        <span class="badge scenario">scenario</span>
        <iframe src="${iframeSrc}" loading="lazy"></iframe>
      </div>
      <div class="meta">
        <p class="name">${label}</p>
        <p class="desc">${desc}</p>
        <p class="author">by Lewis</p>
        <div class="feat"><span class="yes">${t.featPresenter}</span></div>
        <p class="id">templates/full-decks/${deckDir}/</p>
      </div>`;
    card.addEventListener('click',()=>openDeckStudio(studioCtx));
    const copyBtn = card.querySelector('.copy-btn');
    const promptText = fmtCtx.render('deck').prompt;
    copyBtn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const ok = await copyToClipboard(promptText);
      if(ok){
        card.classList.add('copied');
        copyBtn.textContent = t.copied;
        showToast(t.toastCardCopied(label));
        setTimeout(()=>{ card.classList.remove('copied'); copyBtn.textContent = t.copyPrompt; }, 2400);
      }else{ showToast(t.toastFail); }
    });
    return card;
  }

  const colors = colorsForTone(tone.id);
  const demoColor = colorById(tone.defaultColor) || colors[0];
  const ratio3x4 = ratioById('xhs');
  card.innerHTML = `
    <span class="zoom-hint">${T().cardEnterHint}</span>
    <div class="card-demo">
      <span class="badge">${socialCardMode(tone)}</span>
      <span class="badge count">${colors.length} ${lang==='zh'?'配色':'palettes'}</span>
      ${socialPosterMarkup(demoColor, ratio3x4)}
    </div>
    <div class="meta">
      <p class="name">${toneLabel(tone)}</p>
      <p class="desc">${toneDesc(tone)}</p>
      <p class="author">${tone.mode==='tomorrow' ? 'by VibeCoding · 点亮计划' : 'by 歸藏 / guizang-social-card-skill'}</p>
      <p class="enter">▸ ${T().cardEnterHint}</p>
    </div>`;
  card.addEventListener('click',()=>openCardStudio(tone));
  return card;
}

/* ───── 预览工作台: 切配色分支 + 选比例 + 复制 ───── */
const cardModalEl = document.getElementById('card-modal');
let studio = {tone:null, colorId:null, ratioId:'xhs'};

function studioPrompt(){
  return T().promptCard(colorById(studio.colorId), ratioById(studio.ratioId));
}
function renderStudio(){
  const tone = studio.tone;
  // 明天为 3:4 移动端专用, 锁定 xhs
  if(tone.mode==='tomorrow') studio.ratioId = 'xhs';
  const color = colorById(studio.colorId);
  const ratio = ratioById(studio.ratioId);
  const cn = lang==='zh';
  document.getElementById('cs-tone-name').textContent = `${toneLabel(tone)} · ${cn?color.zh:color.en}`;
  document.getElementById('cs-tone-desc').textContent = toneDesc(tone);
  document.getElementById('cs-color-label').textContent = T().csColorLabel;
  document.getElementById('cs-ratio-label').textContent = T().csRatioLabel;
  // 按舞台实际尺寸决定海报以宽还是高撑满, 避免任一比例溢出被裁切
  const stage = document.getElementById('cs-stage');
  const cw = stage.clientWidth - 72, ch = stage.clientHeight - 72;  // 减去 36px padding
  const [ra, rb] = ratio.ratio.split('/').map(Number);
  const fit = (ra/rb) > (cw/ch) ? 'w' : 'h';
  stage.innerHTML = socialPosterMarkup(color, {...ratio, fit});
  document.getElementById('cs-colors').innerHTML = colorsForTone(tone.id).map(c=>
    `<button class="cs-chip${c.id===studio.colorId?' active':''}" data-color="${c.id}"><span class="sw" style="background:${c.accent}"></span>${cn?c.zh:c.en}</button>`
  ).join('');
  const ratioChoices = tone.mode==='tomorrow' ? CARD_RATIOS.filter(r=>r.id==='xhs') : CARD_RATIOS;
  document.getElementById('cs-ratios').innerHTML = ratioChoices.map(r=>
    `<button class="cs-chip ratio${r.id===studio.ratioId?' active':''}" data-ratio="${r.id}">${r.label} · ${cn?r.zh:r.en}</button>`
  ).join('');
  document.getElementById('cs-spec').textContent = color.mode==='tomorrow'
    ? `明天 seed · ${color.themeKey}  ·  ${cn?'统一 1080×1440 (移动端)':'unified 1080×1440 (mobile)'}`
    : `${color.mode==='editorial'?'data-theme':'data-accent'}="${color.themeKey}"  ·  ${ratio.spec}`;
  document.getElementById('cs-note').textContent = T().cardImportNote;
  const copyBtn = document.getElementById('cs-copy');
  copyBtn.textContent = T().copyPrompt;
  copyBtn.classList.remove('ok');
  document.querySelectorAll('#cs-colors .cs-chip').forEach(b=>b.addEventListener('click',()=>{ studio.colorId=b.dataset.color; renderStudio(); }));
  document.querySelectorAll('#cs-ratios .cs-chip').forEach(b=>b.addEventListener('click',()=>{ studio.ratioId=b.dataset.ratio; renderStudio(); }));
}
function openCardStudio(tone){
  studio.tone = tone;
  studio.colorId = tone.defaultColor;
  if(tone.mode==='tomorrow' || !CARD_RATIOS.some(r=>r.id===studio.ratioId)) studio.ratioId = 'xhs';
  cardModalEl.classList.add('open');  // 先显示, 让舞台拿到真实尺寸再渲染海报
  lockScroll(true);
  renderStudio();
}
function closeCardStudio(){ cardModalEl.classList.remove('open'); lockScroll(false); }
document.getElementById('card-close').addEventListener('click', closeCardStudio);
cardModalEl.addEventListener('click', e=>{ if(e.target===cardModalEl) closeCardStudio(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && cardModalEl.classList.contains('open')) closeCardStudio(); });
document.getElementById('cs-copy').addEventListener('click', async ()=>{
  const ok = await copyToClipboard(studioPrompt());
  const btn = document.getElementById('cs-copy');
  if(ok){

/* ───── 皮肤/模板 放大工作台(左预览 右操作: 横/纵切换 + 复制 + 文字介绍) ───── */
const deckModalEl = document.getElementById('deck-modal');
let dsCtx = null;     // {name, desc, spec, render:(fmt)=>({src,prompt})}
let dsFmt = 'deck';
let dsRO = null;
function renderDeckStudio(){
  const cn = lang === 'zh';
  const r = dsCtx.render(dsFmt);
  const stage = document.getElementById('ds-stage');
  stage.innerHTML = '<iframe loading="lazy" referrerpolicy="no-referrer"></iframe>';
  const ifr = stage.querySelector('iframe');
  const isPortrait = dsFmt === 'scroll';
  const ifrW = isPortrait ? 600 : 1280;
  const ifrH = 800;
  ifr.style.width = ifrW + 'px';
  ifr.style.height = ifrH + 'px';
  stage.style.aspectRatio = '1280/800';
  stage.style.background = isPortrait ? '#0c0d12' : '#fff';
  function fitStage(){
    const sw = stage.clientWidth, sh = stage.clientHeight;
    if(!sw || !sh) return;
    const sc = Math.min(sw / ifrW, sh / ifrH);
    ifr.style.transform = 'scale(' + sc + ')';
    ifr.style.left = Math.max(0, (sw - ifrW * sc) / 2) + 'px';
    ifr.style.top  = Math.max(0, (sh - ifrH * sc) / 2) + 'px';
  }
  fitStage();
  if(dsRO) dsRO.disconnect();
  dsRO = new ResizeObserver(fitStage);
  dsRO.observe(stage);
  if(r.src && typeof r.src === 'object' && 'srcdoc' in r.src) ifr.srcdoc = r.src.srcdoc;
  else ifr.src = (r.src && r.src.src) ? r.src.src : r.src;
  document.getElementById('ds-name').textContent = dsCtx.name;
  document.getElementById('ds-desc').textContent = dsCtx.desc;
  document.getElementById('ds-fmt-label').textContent = T().fmtLabel;
  document.getElementById('ds-fmts').innerHTML =
    `<button class="cs-chip${dsFmt==='deck'?' active':''}" data-f="deck">${T().fmtDeck}</button>` +
    `<button class="cs-chip${dsFmt==='scroll'?' active':''}" data-f="scroll">${T().fmtScroll}</button>`;
  document.getElementById('ds-spec').textContent = dsCtx.spec;
  document.getElementById('ds-note').textContent = dsFmt==='deck'
    ? (cn ? '横版演示：一页一屏，可左右翻页 / 演讲者模式' : 'Deck: one screen per page, arrow-key paging / presenter mode')
    : (cn ? '纵向网页：从上到下滚动的汇报 / 信息页，无快捷键' : 'Web page: a top-to-bottom scrolling report, no shortcuts');
  const copy = document.getElementById('ds-copy');
  copy.textContent = T().copyPrompt; copy.classList.remove('ok');
  document.querySelectorAll('#ds-fmts .cs-chip').forEach(b=>b.addEventListener('click',()=>{ dsFmt=b.dataset.f; renderDeckStudio(); }));
}

function closeDeckStudio(){ deckModalEl.classList.remove('open'); lockScroll(false); document.getElementById('ds-stage').innerHTML=''; }

/* 大图预览: 鼠标滚轮 → 翻页(横版左右 / 纵版上下) */
(function(){
  let wheelCool = false;
  document.getElementById('ds-stage').addEventListener('wheel', e=>{
    if(wheelCool) return;
    const abs = Math.abs(e.deltaY) > Math.abs(e.deltaX) ? e.deltaY : e.deltaX;
    if(Math.abs(abs) < 4) return;
    e.preventDefault();
    wheelCool = true;
    const ifr = document.querySelector('#ds-stage iframe');
    if(ifr && ifr.contentWindow){
      const key = abs > 0 ? (dsFmt==='scroll' ? 'ArrowDown' : 'ArrowRight')
                          : (dsFmt==='scroll' ? 'ArrowUp'   : 'ArrowLeft');
      try{ ifr.contentWindow.document.dispatchEvent(new KeyboardEvent('keydown',{key,bubbles:true})); }catch(ex){}
    }
    setTimeout(()=>{ wheelCool=false; }, 280);
  }, {passive:false});
})();
document.getElementById('ds-copy').addEventListener('click', async ()=>{
  const r = dsCtx.render(dsFmt);
  const ok = await copyToClipboard(r.prompt);
  const b = document.getElementById('ds-copy');
  if(ok){ b.textContent=T().copied; b.classList.add('ok'); showToast(T().toastPromptPasted); setTimeout(()=>{ b.textContent=T().copyPrompt; b.classList.remove('ok'); },2000); }
  else showToast(T().toastFail);
});

function render(){

  if(view==='guide'){
    grid.style.display='none';

    guideEl.style.display='block';
    renderGuide();
    return;
  }
  grid.style.display='grid';
  guideEl.style.display='none';

  grid.innerHTML = '';
  if(view === 'ui'){
    const filtered = UI_TASTES.filter(uiTasteMatches);
    if(filtered.length === 0){ emptyEl.style.display='block'; return; }
    emptyEl.style.display='none';
    filtered.forEach(item=>grid.appendChild(createUITasteCard(item)));
    return;
  }

  if(view === 'cards'){
    const filtered = CARD_TONES.filter(toneMatches);
    if(filtered.length === 0){ emptyEl.style.display='block'; return; }
    emptyEl.style.display='none';
    filtered.forEach(tone=>grid.appendChild(createToneCard(tone)));
    return;
  }

  const items = view==='themes' ? THEMES : DECKS;
  const localItems = localItemsForCurrentView().filter(localItemMatches);
  const filtered = items.filter(it=>{
    if(!q) return true;
    return it.join(' ').toLowerCase().includes(q.toLowerCase());
  });
  const showCustom = customCardMatches();
  if(filtered.length===0 && localItems.length===0 && !showCustom){ emptyEl.style.display='block'; return }
  emptyEl.style.display='none';

  if(showCustom) grid.appendChild(createCustomCard());
  localItems.forEach(item=>grid.appendChild(createLocalCard(item)));

  filtered.forEach(it=>{
    const card = document.createElement('div');
    card.className = 'card';
    let promptText, modalLabel, fmtCtx, studioCtx;

    if(view==='themes'){
      const [name] = it;
      const label = themeLabel(it);
      const desc  = themeDesc(it);
      // 横/纵两种格式由放大工作台切换; grid 缩略图固定横版
      fmtCtx = { render:(f)=>({ src:{srcdoc: themeDemo(name, label, null, f)}, prompt: t.promptTheme(name, label, f) }) };
      studioCtx = { name: label, desc, spec: `皮肤 · assets/themes/${name}.css`, render: fmtCtx.render };
      promptText = t.promptTheme(name, label, 'deck');

          <iframe srcdoc='${themeDemo(name,label,null,'deck').replace(/'/g,"&apos;")}' loading="lazy"></iframe>
        </div>
        <div class="meta">
          <p class="name">${label}</p>
          <p class="desc">${desc}</p>
          <p class="id">assets/themes/${name}.css</p>
        </div>`;
    }else{
      const [name,,,kind] = it;
      const label = deckLabel(it);
      const desc  = deckDesc(it);
      const author  = it[6] || '';       // 第7字段: 作者
      const deckDir = it[7] || name;     // 第8字段: 实际目录名(缺省=id)
      const themeKey= it[8] || '';       // 第9字段: URL ?theme= 参数值

      // 按格式生成 iframe src + prompt(modal 切换时复用)
      fmtCtx = { render:(f)=>{
        const params = new URLSearchParams();
        params.set('lang', lang);
        if(themeKey) params.set('theme', themeKey);
        if(f==='scroll') params.set('scroll', '1');
        const url = `full-decks/${deckDir}/index.html?${params}`;
        const prompt = (author && themeKey && t.promptGuizang)
          ? t.promptGuizang(name, label, deckDir, themeKey, f)
          : t.promptDeck(name, label, f);
        return { src:{src:url}, prompt };
      } };
      studioCtx = { name: label, desc, spec: `模板 · templates/full-decks/${deckDir}/`, render: fmtCtx.render };
      const deckR = fmtCtx.render('deck');   // grid 缩略图固定横版
      promptText = deckR.prompt;
      modalLabel = `${label} · ${name}`;
      card.innerHTML = `
        <button class="copy-btn" type="button">${t.copyPrompt}</button>
        <span class="zoom-hint">${t.zoomHint}</span>
        <div class="preview">
          <span class="badge ${kind}">${kind}</span>
          <iframe src="${deckR.src.src}" loading="lazy"></iframe>
        </div>
        <div class="meta">
          <p class="name">${label}</p>

          <p class="id">templates/full-decks/${deckDir}/</p>
        </div>`;
    }

    card.addEventListener('click',()=>openDeckStudio(studioCtx));

    const copyBtn = card.querySelector('.copy-btn');
    copyBtn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const ok = await copyToClipboard(promptText);
      if(ok){
        card.classList.add('copied');
        copyBtn.textContent = T().copied;
        showToast(T().toastCardCopied(card.querySelector('.name').textContent));
        setTimeout(()=>{
          card.classList.remove('copied');
          copyBtn.textContent = T().copyPrompt;
        }, 2400);
      }else{
        showToast(T().toastFail);
      }
    });

    grid.appendChild(card);
  });
}

    }
    setTimeout(()=>{ wc=false; }, 280);
  }, {passive:false});
})();
modalCopy.addEventListener('click', async e => {
  e.stopPropagation();
  if(!modalPrompt) return;
  const ok = await copyToClipboard(modalPrompt);
  if(ok){
    modalCopy.textContent = T().copied;
    modalCopy.classList.add('ok');
    showToast(T().toastPromptPasted);
    setTimeout(()=>{
      modalCopy.textContent = T().copyPrompt;
      modalCopy.classList.remove('ok');
    }, 2000);
  }
});

/* ───── Boot ───── */
(async function boot(){
  // 注入海报 mock 样式(卡内预览复用同一份 SC_CSS)
  document.head.insertAdjacentHTML('beforeend', `<style id="sc-style">${SC_CSS}</style>`);
  applyStaticI18n();
  await loadLocalTaste();
  render();
})();
</script>
