  <rect x="54" y="208" width="20" height="8" rx="3" fill="#a78bfa" opacity=".4"/>
  <rect x="78" y="208" width="20" height="8" rx="3" fill="#555" opacity=".4"/>

  <rect x="128" y="175" width="72" height="48" rx="4" fill="#1a2a1a"/>
