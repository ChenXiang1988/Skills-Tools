  <text x="350" y="210" fill="#67e8f9" font-family="'JetBrains Mono','Menlo',monospace" font-size="9" opacity=".8">--skill "pakco-html"</text>
  <text x="350" y="226" fill="#888" font-family="'JetBrains Mono','Menlo',monospace" font-size="9" opacity=".6"># use XHS editorial template</text>
  <text x="350" y="242" fill="#34d399" font-family="'JetBrains Mono','Menlo',monospace" font-size="9" opacity=".8">--look "xhs-editorial"</text>
  <text x="350" y="258" fill="#f472b6" font-family="'JetBrains Mono','Menlo',monospace" font-size="9" opacity=".8">--format "deck"</text>
