  <rect x="54" y="243" width="60" height="3" rx="1" fill="#444" opacity=".5"/>

  <rect x="128" y="229" width="72" height="48" rx="4" fill="#2a1a2a" stroke="#67e8f9" stroke-width="2"/>
  <rect x="132" y="234" width="30" height="5" rx="2" fill="#fff" opacity=".8"/>
  <rect x="132" y="243" width="60" height="3" rx="1" fill="#888" opacity=".5"/>
