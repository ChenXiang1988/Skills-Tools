  <rect x="635" y="245" width="140" height="4" rx="1" fill="#ddd"/>
  <rect x="635" y="253" width="120" height="4" rx="1" fill="#ddd"/>
  <rect x="635" y="265" width="55" height="16" rx="4" fill="#1a1a1a"/>
  <text x="662" y="277" text-anchor="middle" fill="#fff" font-family="'PingFang SC',sans-serif" font-size="8">做对</text>
  <rect x="695" y="265" width="55" height="16" rx="4" fill="#1a1a1a"/>
  <text x="722" y="277" text-anchor="middle" fill="#fff" font-family="'PingFang SC',sans-serif" font-size="8">没风险</text>
  <rect x="635" y="290" width="200" height="16" rx="4" fill="#f8f4f0"/>
  <text x="645" y="302" fill="#666" font-family="'PingFang SC',sans-serif" font-size="8">未来最值钱的，不是生产…</text>

  <text x="735" y="328" text-anchor="middle" fill="#8a90a4" font-family="'Inter',sans-serif" font-size="11">Agent generates your deck</text>
  <text x="735" y="344" text-anchor="middle" fill="#8a90a4" font-family="'Inter',sans-serif" font-size="11">Pure HTML, open in any browser</text>

  <text x="450" y="395" text-anchor="middle" fill="#fff" font-family="'Inter',sans-serif" font-size="20" font-weight="700">Stop describing taste. Pick it.</text>
  <text x="450" y="420" text-anchor="middle" fill="#6a7086" font-family="'Inter',sans-serif" font-size="12" font-weight="500">Web page / PPT dual mode · Claude Code · Codex · Hermes · any AgentSkill runtime</text>

  <text x="450" y="448" text-anchor="middle" fill="#3a3d4a" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" font-weight="600">pakco-html · Visual taste menu</text>
