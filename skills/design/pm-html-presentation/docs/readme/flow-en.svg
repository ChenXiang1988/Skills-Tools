<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" style="background:#0c0d12;border-radius:16px">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <text x="450" y="36" text-anchor="middle" fill="#67e8f9" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="700" letter-spacing=".08em">PAKCO-HTML</text>
  <text x="450" y="56" text-anchor="middle" fill="#6a7086" font-family="'Inter',sans-serif" font-size="13" font-weight="500">Solving the HTML taste description problem</text>
  <text x="450" y="95" text-anchor="middle" fill="#fff" font-family="'Inter',sans-serif" font-size="28" font-weight="800">Three steps, from taste to finished deck</text>

  <line x1="295" y1="262" x2="320" y2="262" stroke="#3a3d4a" stroke-width="2" stroke-dasharray="4,3"/>
