  <line x1="580" y1="262" x2="605" y2="262" stroke="#3a3d4a" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="603,257 613,262 603,267" fill="#3a3d4a"/>

  <!-- Card 1 -->
  <rect x="40" y="130" width="250" height="210" rx="10" fill="#1e1f2a"/>
