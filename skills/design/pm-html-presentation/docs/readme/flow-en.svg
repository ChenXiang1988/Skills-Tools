  <rect x="132" y="189" width="60" height="3" rx="1" fill="#444" opacity=".5"/>
  <rect x="132" y="195" width="50" height="3" rx="1" fill="#444" opacity=".4"/>
  <rect x="132" y="208" width="20" height="8" rx="3" fill="#67e8f9" opacity=".4"/>

  <rect x="206" y="175" width="72" height="48" rx="4" fill="#2a2a1a"/>
  <rect x="210" y="180" width="30" height="5" rx="2" fill="#f472b6" opacity=".6"/>
  <rect x="210" y="189" width="60" height="3" rx="1" fill="#444" opacity=".5"/>
  <rect x="210" y="195" width="50" height="3" rx="1" fill="#444" opacity=".4"/>

  <rect x="50" y="229" width="72" height="48" rx="4" fill="#1a1a2a"/>
