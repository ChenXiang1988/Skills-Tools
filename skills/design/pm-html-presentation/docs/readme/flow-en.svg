  <rect x="360" y="302" width="120" height="24" rx="12" fill="#1aaf6c"/>
  <text x="420" y="318" text-anchor="middle" fill="#fff" font-family="'Inter',sans-serif" font-size="11" font-weight="600">✓ Copied to clipboard</text>

