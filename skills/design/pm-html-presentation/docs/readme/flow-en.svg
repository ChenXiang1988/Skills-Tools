  <text x="165" y="308" text-anchor="middle" fill="#8a90a4" font-family="'Inter',sans-serif" font-size="11">Browse 60+ live previews</text>
  <text x="165" y="324" text-anchor="middle" fill="#8a90a4" font-family="'Inter',sans-serif" font-size="11">Click the one you like</text>

